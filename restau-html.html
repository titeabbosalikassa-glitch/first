<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Commande Restaurant</title>
</head>

<body>

    <header>
        <h1>Restaurant Le Bon Plat</h1>
    </header>

    <article>
        <h2>Notre Menu</h2>

        <ul>
            <li>Poulet braisé</li>
            <li>Poisson grillé</li>
            <li>Riz sauté</li>
            <li>Frites</li>
            <li>Jus naturel</li>
        </ul>
    </article>

    <article>
        <h2>Formulaire de Commande</h2>

        <form>

            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom">

            <br><br>

            <label for="prenom">Prénom :</label>
            <input type="text" id="prenom" name="prenom">

            <br><br>

            <label for="plat">Plat choisi :</label>
            <select id="plat" name="plat">
                <option>Poulet braisé</option>
                <option>Poisson grillé</option>
                <option>Riz sauté</option>
                <option>Frites</option>
            </select>

            <br><br>

            <label for="boisson">Boisson :</label>
            <select id="boisson" name="boisson">
                <option>Jus naturel</option>
                <option>Eau minérale</option>
                <option>Soda</option>
            </select>

            <br><br>

            <label for="quantite">Quantité :</label>
            <input type="number" id="quantite" name="quantite">

            <br><br>

            <label for="commentaire">Commentaire :</label>
            <br>
            <textarea id="commentaire" name="commentaire"></textarea>

            <br><br>

            <input type="submit" value="Commander">

        </form>
    </article>

</body>

</html>
